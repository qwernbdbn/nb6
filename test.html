// 等级配置
const levelConfig = {
  getExpNeed(level){ return level * 100 },
  addExp(user, exp){
    user.exp = (user.exp || 0) + exp;
    let level = user.level || 1;
    let need = this.getExpNeed(level);
    while(user.exp >= need){
      user.exp -= need;
      level++;
      need = this.getExpNeed(level);
    }
    user.level = level;
    this.saveUser(user);
  },
  saveUser(user){
    let list = getUserList();
    let idx = list.findIndex(u=>u.user===user.user);
    if(idx>-1) list[idx] = user;
    localStorage.setItem("user_list",JSON.stringify(list));
    localStorage.setItem("login_user",JSON.stringify(user));
  }
};

// 签到
function signIn(){
  if(!userData){ tip("请先登录"); return; }
  let today = new Date().toDateString();
  if(userData.lastSign === today){ tip("今日已签到"); return; }
  userData.lastSign = today;
  levelConfig.addExp(userData, 50);
  showHome();
  toast("签到成功 +50经验");
}

// 页面切换
function show(id){
    let kamiType = localStorage.getItem("kamiType");
    if(kamiType === "free" && (id === "p7" || id.startsWith("p7_"))){
        tip("免费卡密无法使用功能专区，请使用VIP卡密");
        show("p4");
        return;
    }
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hide"));
    $(id).classList.remove("hide");
}

function tip(text){$("mdText").innerText=text;$("md").classList.remove("hide");}
function closeMd(){$("md").classList.add("hide");}
function toast(msg){$("toast").innerText=msg;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),2000);}

function getUserList(){return JSON.parse(localStorage.getItem("user_list")||"[]");}
function isNameExist(name){return getUserList().some(u=>u.user===name);}

function saveUser(user){
  let list=getUserList();
  let old = list.find(u=>u.user===user.user);
  if(old) Object.assign(old, user);
  else list.push(user);
  localStorage.setItem("user_list",JSON.stringify(list));
}

function updateUser(oldName,newUser){
  let list=getUserList();
  let idx=list.findIndex(u=>u.user===oldName);
  if(idx!==-1)list[idx]=newUser;
  localStorage.setItem("user_list",JSON.stringify(list));
}

// 自动登录
function autoLogin(){
  let save=localStorage.getItem("login_user");
  if(save){
    userData=JSON.parse(save);
    toast("自动登录成功");
    return true;
  }
  return false;
}

function toUser(){
    if(autoLogin()){ showHome(); return; }
    show("p5");
}

function createID(){return "BS"+Date.now()+Math.floor(Math.random()*9999);}

function showHome(){
    $("profileName").innerText = userData.user;
    $("profileDesc").innerText = userData.desc || "这个人很懒，什么都没有留下";
    $("profileId").innerText = "ID："+userData.id;
    $("profileLevel").innerText = `等级：${userData.level || 1}`;
    let need = levelConfig.getExpNeed(userData.level || 1);
    $("profileExp").innerText = `经验：${userData.exp || 0} / ${need}`;
    show("p6");
}

function logout(){
    localStorage.removeItem("login_user");
    userData=null;
    tip("已退出登录");
    show("p5");
}

function auth(){
    let user=$("user").value.trim(),pwd=$("pwd").value.trim();
    if(!user||!pwd){tip("请填写账号密码");return;}
    if(!isLogin){
        if(isNameExist(user)){tip("该名称已被占用！");return;}
        userData={
          user:user,pwd:pwd,id:createID(),
          desc:"这个人很懒，什么都没有留下",
          level:1, exp:0, lastSign:""
        };
        saveUser(userData);
        localStorage.setItem("login_user",JSON.stringify(userData));
        tip("注册成功！自动登录");
        setTimeout(showHome,1200);
        return;
    }
    let target=getUserList().find(u=>u.user===user&&u.pwd===pwd);
    if(target){
      userData=target;
      if(!userData.level) userData.level=1;
      if(!userData.exp) userData.exp=0;
      localStorage.setItem("login_user",JSON.stringify(userData));
      tip("登录成功");
      setTimeout(showHome,1200);
    }else{
      tip("账号密码错误");
    }
}

function saveProfile(){
    let newName=$("editName").value.trim();
    let newDesc=$("editDesc").value.trim();
    if(!newName){tip("昵称不能为空");return;}
    if(!userData){tip("请先登录");return;}
    if(newName!==userData.user && isNameExist(newName)){tip("该名称已被占用！");return;}
    let oldName=userData.user;
    userData.user=newName;
    userData.desc=newDesc;
    updateUser(oldName,userData);
    localStorage.setItem("login_user",JSON.stringify(userData));
    showHome();
    toast("资料修改成功");
    closeEditModal();
}

class Particle{constructor(x,y,color){this.x=x;this.y=y;this.speed=Math.random()*4+2;this.angle=Math.random()*Math.PI*2;this.gravity=0.05;this.vx=Math.cos(this.angle)*this.speed;this.vy=Math.sin(this.angle)*this.speed;this.alpha=1;this.decay=Math.random()*0.02+0.01;this.color=color;}update(){this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay;}draw(){ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();ctx.restore();}}
let particles=[];const colors=["#ff0040","#fff","#39ff14","#ff69b4","#ffff00"];
function createFirework(x,y){fireworkEnable&&Array.from({length:100}).forEach(()=>particles.push(new Particle(x,y,colors[Math.floor(Math.random()*colors.length)])));}
function animateFirework(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.update();p.draw();p.alpha<=0&&particles.splice(i,1);}requestAnimationFrame(animateFirework);}
animateFirework();
window.addEventListener("click",(e)=>createFirework(e.clientX,e.clientY));

let dragging=false,startX,startY,initLeft,initTop,isClick=true;

function dragStart(e){dragging=true;isClick=true;let t=e.touches?e.touches[0]:e;startX=t.clientX;startY=t.clientY;initLeft=parseFloat(floatBall.style.left);initTop=parseFloat(floatBall.style.top);}
function dragMove(e){if(!dragging)return;isClick=false;e.preventDefault();let t=e.touches?e.touches[0]:e;let nx=initLeft+(t.clientX-startX);let ny=initTop+(t.clientY-startY);let maxW=window.innerWidth-floatBall.offsetWidth;let maxH=window.innerHeight-floatBall.offsetHeight;nx=Math.max(0,Math.min(nx,maxW));ny=Math.max(0,Math.min(ny,maxH));floatBall.style.left=nx+"px";floatBall.style.top=ny+"px";}
function dragEnd(){dragging=false;}

function convertBase(){const numStr=$("numInput").value.trim();const from=parseInt($("fromBase").value);const to=parseInt($("toBase").value);if(!numStr){tip("请输入数字");return;}try{const dec=parseInt(numStr,from);if(isNaN(dec))throw new Error();let res="";if(to===2)res=dec.toString(2);if(to===10)res=dec.toString(10);if(to===16)res=dec.toString(16).toUpperCase();$("baseResult").innerText=`转换结果：${res}`;toast("转换成功");}catch(e){tip("数字无效");}}
function countText(){const text=$("textCount").value;const len=text.length;const cnLen=(text.match(/[\u4e00-\u9fa5]/g)||[]).length;const enLen=len-cnLen;const words=text.trim().split(/\s+/).filter(w=>w).length;$("countResult").innerText=`总字符数：${len}\n汉字数：${cnLen}\n字母/符号数：${enLen}\n单词数：${words}`;toast("统计完成");}
